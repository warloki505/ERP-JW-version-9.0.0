<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sistema de Gestão Financeira Pessoal" />
  <title>ERP JW Finance - Login</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />

  <!-- Firebase: inicialização única -->
  <script src="js/core/firebase-init.js"></script>
</head>

<body>
  <main class="container" style="max-width: 800px; padding-top: 60px;">
    <div style="text-align: center; margin-bottom: 40px;">
      <h1>💰 ERP JW Finance - Login</h1>
      <p class="text-muted">Controle suas finanças com inteligência</p>
    </div>

    <!-- LOGIN -->
    <section class="card">
      <h2>Entrar na sua conta</h2>
      <form id="login-form" class="form" novalidate>
        <div class="form-group">
          <label for="login-email">E-mail</label>
          <input
            type="email"
            id="login-email"
            placeholder="seu@email.com"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label for="login-password">Senha</label>
          <input
            type="password"
            id="login-password"
            placeholder="Digite sua senha"
            autocomplete="current-password"
            required
          />
        </div>

        <button class="btn btn--primary" type="submit" style="width: 100%;">
          Entrar
        </button>
      </form>
    </section>

    <!-- CADASTRO -->
    <section class="card">
      <h2>Criar nova conta</h2>
      <form id="signup-form" class="form" novalidate>
        <div class="form-group">
          <label for="signup-name">Nome completo</label>
          <input
            type="text"
            id="signup-name"
            placeholder="Digite seu nome"
            autocomplete="name"
            required
          />
        </div>

        <div class="form-group">
          <label for="signup-email">E-mail</label>
          <input
            type="email"
            id="signup-email"
            placeholder="seu@email.com"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label for="signup-password">Senha</label>
          <input
            type="password"
            id="signup-password"
            placeholder="Mínimo 6 caracteres"
            autocomplete="new-password"
            minlength="6"
            required
          />
          <small class="text-muted">A senha deve ter no mínimo 6 caracteres</small>
        </div>

        <button class="btn btn--success" type="submit" style="width: 100%;">
          Criar conta
        </button>
      </form>
    </section>

    <!-- STATUS -->
    <div id="status" class="status hidden" aria-live="polite"></div>

    <p class="text-center text-muted" style="margin-top: 32px;">
      <small id="auth-mode-hint">🔒 Carregando modo de autenticação...</small>
    </p>
  </main>

  <!-- Scripts do ERP -->
  <script src="js/core/constants.js"></script>
  <script src="js/core/config.js"></script>
  <script src="js/core/core.js"></script>
  <script src="js/utils/ui.js"></script>
  <script src="js/sync/sync-service.js"></script>
  <script src="js/features/index.js"></script>
</body>
</html>
